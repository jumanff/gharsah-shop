<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول / حساب جديد - غرسة 🌿</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 20px; }
        .tabs { display: flex; border-bottom: 2px solid #eaf4f0; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-size: 16px; font-weight: bold; color: #777; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: #2d6a4f; border-bottom: 3px solid #2d6a4f; }
        .auth-form { display: none; flex-direction: column; gap: 15px; text-align: right; }
        .auth-form.active { display: flex; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-weight: bold; color: #444; }
        .input-group input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; width: 100%; box-sizing: border-box; }
        .error-message { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 11px; border-radius: 6px; display: none; font-size: 14px; font-weight: bold; text-align: right; }
        .submit-btn { padding: 12px; background-color: #2d6a4f; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .submit-btn:hover { background-color: #1b4332; }
        .back-link { text-align: center; color: #2d6a4f; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('customerLoginForm', event)">تسجيل الدخول</button>
        <button class="tab-btn" onclick="switchTab('register-form', event)">حساب جديد</button>
    </div>

    <div id="customer-error-box" class="error-message"></div>

    <form id="customerLoginForm" class="auth-form active">
        <div class="input-group">
            <label>البريد الإلكتروني:</label>
            <input type="email" id="loginEmail" required placeholder="example@gmail.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور:</label>
            <input type="password" id="loginPassword" required placeholder="••••••••">
        </div>
        <button type="submit" class="submit-btn">دخول المتجر 🛒</button>
<a href="/forgot-password" style="display: block; text-align: center; margin-top: 10px; color: #2d6a4f; text-decoration: none; font-size: 14px;">نسيت كلمة المرور؟</a>
    </form>

    <form action="/register" method="POST" id="register-form" class="auth-form">
        <div class="input-group">
            <label>اسم المستخدم بالكامل:</label>
            <input type="text" name="username" required placeholder="جمان حسن">
        </div>
        <div class="input-group">
            <label>البريد الإلكتروني:</label>
            <input type="email" name="email" required placeholder="example@gmail.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور السرية:</label>
            <input type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="submit-btn">إنشاء حساب وإرسال رابط التفعيل 🌿</button>
    </form>

    <a href="/" class="back-link">🏠 العودة للمتجر الرئيسي</a>
</div>

<script>
    function switchTab(formId, event) {
        document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(formId).classList.add('active');
        if (event && event.target) {
            event.target.classList.add('active');
        }
        document.getElementById('customer-error-box').style.display = 'none';
    }

    document.getElementById('customerLoginForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        const errorBox = document.getElementById('customer-error-box');
        errorBox.style.display = 'none';
        
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        let formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);
        
        fetch('/login', { method: 'POST', body: formData })
        .then(res => {
            if (!res.ok) {
                throw new Error("سيرفر المتجر واجه خطأ أثناء التحقق.");
            }
            return res.json();
        })
        .then(data => {
            if (data.success) { 
                window.location.href = data.redirect; 
            } else { 
                errorBox.innerText = data.message; 
                errorBox.style.display = 'block'; 
            }
        })
        .catch(err => { 
            errorBox.innerText = "❌ خطأ: البريد الإلكتروني أو كلمة المرور غير صحيحة، أو لم يتم تفعيل الحساب بريدياً بعد."; 
            errorBox.style.display = 'block'; 
        });
    });
</script>
</body>
</html>
