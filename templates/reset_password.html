<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تغيير كلمة المرور - متجر غرسة 🌿</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding-top: 100px; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2d6a4f; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>تعيين كلمة مرور جديدة</h2>
        <form action="/reset-password/{{ token }}" method="POST">
            <input type="password" name="password" placeholder="كلمة المرور الجديدة" required>
            <button type="submit">تحديث الرمز وحفظه</button>
        </form>
    </div>
</body>
</html>
